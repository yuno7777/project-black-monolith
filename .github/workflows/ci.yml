name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mcp-shield:
    name: MCP-Shield (Rust build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-shield
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # The outbox verification spawns fixtures/fake_mcp_server.py as the
      # proxied server and fixtures/fake_ingest.js as the stand-in dashboard.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build
        run: cargo build --verbose
      - name: Test
        run: cargo test --verbose
      - name: Verify the durable outbox (spool / redeliver / dead-letter)
        run: bash fixtures/verify_outbox.sh

  vector-anchor:
    name: VectorAnchor (Python tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vector-anchor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run tests
        run: python -m pytest tests/ -q

  trace-audit:
    name: TraceAudit (Python tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trace-audit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run tests
        run: python -m pytest tests/ -q

  dashboard:
    name: Dashboard (Next.js build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  integration:
    name: Integration (ingest contract + outage recovery)
    runs-on: ubuntu-latest
    # The unit suites are cheap and catch most breakage; only pay for the
    # 5-image stack build once they are green.
    needs: [mcp-shield, vector-anchor, trace-audit, dashboard]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate local secrets
        # Ephemeral per-run credentials; nothing here is a real secret, and
        # .env is gitignored so none of it can be committed.
        run: bash scripts/generate_secrets.sh
      - name: Bring the stack up
        run: docker compose up -d --build --wait
      - name: Verify the ingestion contract
        run: bash scripts/verify_ingest.sh
      - name: Verify outage recovery (spool -> drain)
        run: bash scripts/verify_recovery.sh
      - name: Verify the incident lifecycle
        run: bash scripts/verify_incidents.sh
      - name: Verify cross-layer correlation
        run: bash scripts/verify_correlation.sh
      - name: Run the full three-attack demo
        run: ./run_full_demo.sh
      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=120
      - name: Tear the stack down
        if: always()
        run: docker compose down -v
