name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mcp-shield:
    name: MCP-Shield (Rust build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-shield
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --verbose
      - name: Test
        run: cargo test --verbose

  vector-anchor:
    name: VectorAnchor (Python tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vector-anchor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run tests
        run: python -m pytest tests/ -q

  trace-audit:
    name: TraceAudit (Python tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trace-audit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run tests
        run: python -m pytest tests/ -q

  dashboard:
    name: Dashboard (Next.js build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
